<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#13132a"/>
  <!-- Candlestick 1 (red/bearish) -->
  <line x1="9" y1="6" x2="9" y2="26" stroke="#f87171" stroke-width="1.5"/>
  <rect x="6.5" y="10" width="5" height="8" rx="1" fill="#f87171"/>
  <!-- Candlestick 2 (green/bullish) -->
  <line x1="17" y1="4" x2="17" y2="24" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="14.5" y="8" width="5" height="10" rx="1" fill="#4ade80"/>
  <!-- Candlestick 3 (green/bullish, taller) -->
  <line x1="25" y1="3" x2="25" y2="22" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="22.5" y="6" width="5" height="10" rx="1" fill="#4ade80"/>
</svg>
