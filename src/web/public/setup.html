<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade Bot — First Time Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c14;
      --card-bg: #13132a;
      --card-border: rgba(255,255,255,0.05);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --input-bg: #1a1a35;
      --input-border: rgba(255,255,255,0.1);
      --accent: #4ade80;
      --accent-hover: #22c55e;
      --error: #f87171;
      --font: 'Inter', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .card .subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .qr-container {
      margin-bottom: 1.5rem;
    }

    .qr-container img {
      width: 200px;
      height: 200px;
      border-radius: 12px;
      background: #fff;
      padding: 8px;
    }

    .manual-entry {
      margin-bottom: 2rem;
      text-align: left;
    }

    .manual-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 0.8125rem;
      cursor: pointer;
      padding: 0.25rem 0;
      transition: color 0.2s;
    }

    .manual-toggle:hover { color: var(--text); }

    .manual-toggle .arrow {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 0.625rem;
    }

    .manual-toggle .arrow.open { transform: rotate(90deg); }

    .manual-content {
      display: none;
      margin-top: 0.75rem;
      padding: 0.75rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
    }

    .manual-content.visible { display: block; }

    .manual-content .secret-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.375rem;
    }

    .manual-content .secret-value {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9375rem;
      letter-spacing: 0.15em;
      word-break: break-all;
      color: var(--accent);
    }

    .divider {
      height: 1px;
      background: var(--card-border);
      margin: 1.5rem 0;
    }

    .verify-heading {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
    }

    .verify-subtitle {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-align: left;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 1.25rem;
      letter-spacing: 0.5em;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: #0c0c14;
      font-family: var(--font);
      font-size: 0.9375rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      display: none;
      color: var(--error);
      font-size: 0.8125rem;
      margin-top: 1rem;
    }

    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set up your authenticator</h1>
    <p class="subtitle">Scan this QR code with Google Authenticator, Authy, or any TOTP app</p>

    <div class="qr-container">
      <img id="qr-img" src="/auth/setup-qr" alt="TOTP QR Code">
    </div>

    <div class="manual-entry">
      <button type="button" class="manual-toggle" id="manual-toggle">
        <span class="arrow" id="manual-arrow">&#9654;</span>
        Manual entry
      </button>
      <div class="manual-content" id="manual-content">
        <p class="secret-label">Secret key</p>
        <p class="secret-value" id="secret-value">Loading...</p>
      </div>
    </div>

    <div class="divider"></div>

    <p class="verify-heading">Verify Setup</p>
    <p class="verify-subtitle">Enter the code shown in your authenticator app</p>

    <form id="setup-form">
      <div class="form-group">
        <label for="token">6-digit code</label>
        <input
          type="text"
          id="token"
          name="token"
          maxlength="6"
          inputmode="numeric"
          pattern="[0-9]{6}"
          autocomplete="one-time-code"
          required
        >
      </div>
      <button type="submit" class="btn" id="submit-btn">Confirm</button>
    </form>
    <p class="error-msg" id="error-msg"></p>
  </div>

  <script>
    (function () {
      var form = document.getElementById('setup-form');
      var tokenInput = document.getElementById('token');
      var errorMsg = document.getElementById('error-msg');
      var submitBtn = document.getElementById('submit-btn');
      var manualToggle = document.getElementById('manual-toggle');
      var manualArrow = document.getElementById('manual-arrow');
      var manualContent = document.getElementById('manual-content');
      var secretValue = document.getElementById('secret-value');

      function showError(text) {
        errorMsg.textContent = text;
        errorMsg.classList.add('visible');
      }

      function hideError() {
        errorMsg.classList.remove('visible');
        errorMsg.textContent = '';
      }

      // Toggle manual entry section
      manualToggle.addEventListener('click', function () {
        var isOpen = manualContent.classList.toggle('visible');
        if (isOpen) {
          manualArrow.classList.add('open');
        } else {
          manualArrow.classList.remove('open');
        }
      });

      // Fetch the secret for manual entry
      fetch('/auth/setup-info')
        .then(function (res) {
          if (!res.ok) throw new Error('Failed to load setup info');
          return res.json();
        })
        .then(function (data) {
          secretValue.textContent = data.secret || 'Unavailable';
        })
        .catch(function () {
          secretValue.textContent = 'Could not load secret';
        });

      // Only allow numeric input
      tokenInput.addEventListener('input', function () {
        this.value = this.value.replace(/[^0-9]/g, '');
        hideError();
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        hideError();

        var token = tokenInput.value.trim();
        if (token.length !== 6) {
          showError('Please enter a 6-digit code');
          return;
        }

        submitBtn.disabled = true;

        fetch('/auth/setup-confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token })
        })
          .then(function (res) {
            if (res.ok) {
              window.location.href = '/';
              return;
            }
            return res.json().then(function (data) {
              showError(data.error || 'Verification failed');
              submitBtn.disabled = false;
              tokenInput.value = '';
              tokenInput.focus();
            });
          })
          .catch(function () {
            showError('Network error \u2014 check your connection');
            submitBtn.disabled = false;
          });
      });
    })();
  </script>
</body>
</html>
