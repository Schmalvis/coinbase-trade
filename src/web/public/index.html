<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade Bot</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolyline points='2,24 9,16 15,20 21,10 28,6' fill='none' stroke='%23c8901e' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cline x1='2' y1='28' x2='30' y2='28' stroke='%23c8901e' stroke-width='1.5' stroke-linecap='round' opacity='0.45'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <!-- Apply stored theme before first paint to avoid flash -->
  <script>document.documentElement.dataset.theme = localStorage.getItem('cb-theme') || 'dark';</script>
  <style>
    /* ── Dark theme (default) ─────────────────────────────────────────────────── */
    :root {
      --bg:         #07080c;
      --surface:    #0c0e18;
      --surface-2:  #10121e;
      --border:     #181c2c;
      --border-hi:  #222638;
      --accent:     #c8901e;
      --accent-lo:  rgba(200,144,30,0.10);
      --green:      #29c880;
      --green-lo:   rgba(41,200,128,0.08);
      --red:        #d43c58;
      --red-lo:     rgba(212,60,88,0.10);
      --blue:       #4a9eff;
      --blue-lo:    rgba(74,158,255,0.10);
      --amber:      #d4882a;
      --text:       #c8cad8;
      --text-2:     #4a5068;
      --text-3:     #22263a;
      --chart-grid: #181c2c;
      --chart-tick: #4a5068;
      --dot-color:  rgba(40,46,72,0.45);
      --scanline:   rgba(0,0,0,0.06);
    }

    /* ── Light theme ─────────────────────────────────────────────────────────── */
    [data-theme="light"] {
      --bg:         #f4f1ea;
      --surface:    #ece8df;
      --surface-2:  #e3dfd4;
      --border:     #cdc7b6;
      --border-hi:  #b4ad9a;
      --accent:     #b87218;
      --accent-lo:  rgba(184,114,24,0.10);
      --green:      #1a9456;
      --green-lo:   rgba(26,148,86,0.08);
      --red:        #bf2843;
      --red-lo:     rgba(191,40,67,0.10);
      --blue:       #1f6ac4;
      --blue-lo:    rgba(31,106,196,0.10);
      --amber:      #a86c14;
      --text:       #1c1810;
      --text-2:     #726550;
      --text-3:     #b8b0a0;
      --chart-grid: #cdc7b6;
      --chart-tick: #726550;
      --dot-color:  rgba(150,138,118,0.30);
      --scanline:   rgba(0,0,0,0.012);
    }

    /* ── Transitions ─────────────────────────────────────────────────────────── */
    body,
    .card, .chart-card,
    table, th, td,
    header, .section-title::after,
    button, .net-btn {
      transition: background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow Condensed', sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(var(--dot-color) 1px, transparent 1px);
      background-size: 22px 22px;
      color: var(--text);
      padding: 1.25rem;
      min-height: 100vh;
    }

    /* scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        var(--scanline) 3px,
        var(--scanline) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      padding-bottom: 0.85rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 80px;
      height: 1px;
      background: var(--accent);
    }

    .title {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .title-sub {
      color: var(--text-2);
      font-weight: 400;
      margin-left: 0.6rem;
      letter-spacing: 0.08em;
      font-size: 0.85rem;
    }

    .header-right { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .network-selector { display: flex; gap: 0.35rem; }

    .net-btn {
      padding: 0.22rem 0.8rem;
      border: 1px solid var(--border-hi);
      background: transparent;
      color: var(--text-2);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .net-btn.active {
      background: var(--accent-lo);
      border-color: var(--accent);
      color: var(--accent);
    }
    .net-btn.mainnet.active {
      background: var(--green-lo);
      border-color: var(--green);
      color: var(--green);
    }
    .net-btn:hover:not(.active) {
      border-color: var(--text-2);
      color: var(--text);
    }

    /* Theme toggle button */
    .btn-theme {
      padding: 0.22rem 0.8rem;
      border: 1px solid var(--border-hi);
      background: transparent;
      color: var(--text-2);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .btn-theme:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #lastUpdate {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-3);
      letter-spacing: 0.04em;
    }

    /* ── Wallet address expand/copy ──────────────────────────────────────────── */
    .wallet-wrap {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
    }
    .wallet-addr {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.4;
      word-break: break-all;
      color: var(--text);
      transition: color 0.1s;
    }
    .wallet-wrap:hover .wallet-addr { color: var(--accent); }
    .wallet-copy {
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
      color: var(--text-2);
      font-size: 0.7rem;
    }
    .wallet-wrap:hover .wallet-copy,
    .wallet-wrap.expanded .wallet-copy { opacity: 1; }
    .wallet-copy.copied { color: var(--green); }

    /* ── Stat cards ──────────────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.6rem;
      margin-bottom: 0.7rem;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.85rem 1rem 0.8rem;
    }
    /* corner brackets appear on hover */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 9px;
      height: 9px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
    .card:hover { border-color: var(--border-hi); }
    .card:hover::before, .card:hover::after { opacity: 1; }

    .card .label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 0.35rem;
    }
    .card .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.22rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .card .sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      color: var(--text-2);
      margin-top: 0.25rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* status classes applied by JS */
    .value.status-running { color: var(--green); }
    .value.status-paused  { color: var(--amber); }
    .value.status-stopped { color: var(--red); }

    .dry-badge {
      display: inline-block;
      background: rgba(212,136,42,0.18);
      border: 1px solid var(--amber);
      color: var(--amber);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 1px 5px;
      margin-left: 0.4rem;
      vertical-align: middle;
      text-transform: uppercase;
    }

    /* ── Controls ────────────────────────────────────────────────────────────── */
    .controls {
      display: flex;
      gap: 0.45rem;
      margin-bottom: 0.7rem;
      flex-wrap: wrap;
    }

    button {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.42rem 1.2rem;
      border: 1px solid;
      background: transparent;
      cursor: pointer;
    }
    .btn-pause  { border-color: var(--amber); color: var(--amber); }
    .btn-resume { border-color: var(--green); color: var(--green); }
    .btn-buy    { border-color: var(--blue);  color: var(--blue); }
    .btn-sell   { border-color: var(--red);   color: var(--red); }

    .btn-pause:hover  { background: rgba(212,136,42,0.14); }
    .btn-resume:hover { background: var(--green-lo); }
    .btn-buy:hover    { background: var(--blue-lo); }
    .btn-sell:hover   { background: var(--red-lo); }
    .btn-faucet { border-color: var(--text-2); color: var(--text-2); }
    .btn-faucet:hover { border-color: var(--text); color: var(--text); }
    .btn-faucet:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Charts ──────────────────────────────────────────────────────────────── */
    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 0.7rem;
    }
    @media (max-width: 600px) { .charts { grid-template-columns: 1fr; } }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.85rem;
    }
    .chart-title {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 0.5rem;
    }
    .chart-wrap { height: 165px; position: relative; }

    /* ── Section divider ─────────────────────────────────────────────────────── */
    .section-title {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 0.5rem;
    }
    .section-title::before {
      content: '///';
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      font-size: 0.6rem;
      letter-spacing: 0.05em;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Trades table ────────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    th {
      background: var(--surface-2);
      border-bottom: 1px solid var(--border-hi);
      padding: 0.5rem 0.75rem;
      text-align: left;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-2);
      text-transform: uppercase;
      white-space: nowrap;
    }
    td {
      padding: 0.5rem 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      border-top: 1px solid var(--border);
    }
    tr:hover td { background: var(--surface-2); }

    .buy  {
      color: var(--green);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    .sell {
      color: var(--red);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    .empty-row td {
      text-align: center;
      color: var(--text-3);
      padding: 2rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>
    <div class="title">Trade Bot<span class="title-sub">/ autonomous</span></div>
    <div class="header-right">
      <div class="network-selector" id="networkSelector"></div>
      <button class="btn-theme" id="themeToggle" onclick="toggleTheme()">—</button>
      <div id="lastUpdate">—</div>
    </div>
  </header>

  <div class="grid">
    <div class="card">
      <div class="label">Status</div>
      <div class="value" id="status">—</div>
    </div>
    <div class="card">
      <div class="label">ETH Price</div>
      <div class="value" id="price">—</div>
      <div class="sub" id="strategy">—</div>
    </div>
    <div class="card">
      <div class="label">ETH Balance</div>
      <div class="value" id="ethBalance">—</div>
    </div>
    <div class="card">
      <div class="label">USDC Balance</div>
      <div class="value" id="usdcBalance">—</div>
    </div>
    <div class="card">
      <div class="label">Portfolio</div>
      <div class="value" id="portfolio">—</div>
      <div class="sub" id="lastTrade">—</div>
    </div>
    <div class="card">
      <div class="label">Wallet</div>
      <div class="value" style="line-height:1">
        <div class="wallet-wrap" id="walletWrap" onclick="toggleWalletAddress()" title="Click to expand / copy">
          <span class="wallet-addr" id="walletAddress">—</span>
          <span class="wallet-copy" id="walletCopy">⎘</span>
        </div>
      </div>
      <div class="sub" id="walletNetwork">—</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-pause"  onclick="control('pause')">Pause</button>
    <button class="btn-resume" onclick="control('resume')">Resume</button>
    <button class="btn-buy"    onclick="manualTrade('buy')">Buy</button>
    <button class="btn-sell"   onclick="manualTrade('sell')">Sell</button>
    <button class="btn-faucet" id="faucetBtn" onclick="requestFaucet()" style="display:none">Faucet</button>
  </div>

  <div class="charts">
    <div class="chart-card">
      <div class="chart-title">ETH Price — 24h</div>
      <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Portfolio — 24h</div>
      <div class="chart-wrap"><canvas id="portfolioChart"></canvas></div>
    </div>
  </div>

  <div class="section-title">Recent Trades</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Time</th><th>Action</th><th>Amount</th><th>Price</th><th>Reason</th><th>Tx</th></tr>
      </thead>
      <tbody id="trades"></tbody>
    </table>
  </div>

  <script>
    let priceChart, portfolioChart;
    let availableNetworks = [], activeNetwork = '';

    // ── Theme ─────────────────────────────────────────────────────────────────
    function getChartColors() {
      const s = getComputedStyle(document.documentElement);
      return {
        grid: s.getPropertyValue('--chart-grid').trim(),
        ticks: s.getPropertyValue('--chart-tick').trim(),
      };
    }

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      document.getElementById('themeToggle').textContent = theme === 'dark' ? 'Light' : 'Dark';
      localStorage.setItem('cb-theme', theme);
      const c = getChartColors();
      [priceChart, portfolioChart].forEach(chart => {
        if (!chart) return;
        chart.options.scales.y.ticks.color = c.ticks;
        chart.options.scales.y.grid.color = c.grid;
        chart.update('none');
      });
    }

    function toggleTheme() {
      applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
    }

    // Sync button label to current theme (set in <head> script)
    document.addEventListener('DOMContentLoaded', () => {
      const stored = localStorage.getItem('cb-theme') || 'dark';
      document.getElementById('themeToggle').textContent = stored === 'dark' ? 'Light' : 'Dark';
    });

    // ── Network selector ──────────────────────────────────────────────────────
    function renderNetworkSelector() {
      const el = document.getElementById('networkSelector');
      el.innerHTML = availableNetworks.map(n => {
        const isActive = n === activeNetwork;
        const isMainnet = n.includes('mainnet');
        return `<button class="net-btn ${isActive ? 'active' : ''} ${isMainnet ? 'mainnet' : ''}"
                  onclick="switchNetwork('${n}')">${n}</button>`;
      }).join('');
    }

    async function switchNetwork(network) {
      if (network === activeNetwork) return;
      await fetch('/api/network', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ network }),
      });
      activeNetwork = network;
      renderNetworkSelector();
      await refresh();
    }

    // ── Status ────────────────────────────────────────────────────────────────
    async function loadStatus() {
      const s = await fetch('/api/status').then(r => r.json());

      if (s.availableNetworks?.length) {
        availableNetworks = s.availableNetworks;
        activeNetwork = s.activeNetwork;
        renderNetworkSelector();
      }

      const statusEl = document.getElementById('status');
      statusEl.textContent = s.status;
      statusEl.className = 'value status-' + s.status;
      if (s.dryRun) statusEl.innerHTML += '<span class="dry-badge">Dry</span>';

      document.getElementById('price').textContent = s.lastPrice ? '$' + s.lastPrice.toFixed(2) : '—';
      document.getElementById('strategy').textContent = s.strategy ? 'Strategy: ' + s.strategy : '';
      document.getElementById('ethBalance').textContent = s.ethBalance != null ? s.ethBalance.toFixed(6) + ' ETH' : '—';
      document.getElementById('usdcBalance').textContent = s.usdcBalance != null ? s.usdcBalance.toFixed(2) + ' USDC' : '—';
      document.getElementById('portfolio').textContent = s.portfolioUsd != null ? '$' + s.portfolioUsd.toFixed(2) : '—';
      document.getElementById('lastTrade').textContent = s.lastTradeAt
        ? 'Last trade: ' + new Date(s.lastTradeAt).toLocaleTimeString() : 'No trades yet';
      document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString();
    }

    // ── Charts ────────────────────────────────────────────────────────────────
    function makeChartOptions() {
      const c = getChartColors();
      return {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: { display: false },
          y: {
            ticks: { color: c.ticks, font: { size: 10, family: "'JetBrains Mono', monospace" } },
            grid: { color: c.grid },
          }
        },
        plugins: { legend: { display: false } },
        animation: false,
      };
    }

    function makeChart(id, color, bg) {
      return new Chart(document.getElementById(id), {
        type: 'line',
        data: { labels: [], datasets: [{ data: [], borderColor: color, borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: true, backgroundColor: bg }] },
        options: makeChartOptions(),
      });
    }

    async function loadCharts() {
      const data = await fetch('/api/prices?limit=288').then(r => r.json());
      const labels    = data.map(d => d.timestamp).reverse();
      const prices    = data.map(d => d.eth_price).reverse();
      const portfolio = data.map(d => d.portfolio_usd).reverse();

      if (!priceChart)     priceChart     = makeChart('priceChart',     '#c8901e', 'rgba(200,144,30,0.07)');
      if (!portfolioChart) portfolioChart = makeChart('portfolioChart', '#29c880', 'rgba(41,200,128,0.07)');

      priceChart.data.labels = labels;
      priceChart.data.datasets[0].data = prices;
      priceChart.update('none');

      portfolioChart.data.labels = labels;
      portfolioChart.data.datasets[0].data = portfolio;
      portfolioChart.update('none');
    }

    // ── Trades ────────────────────────────────────────────────────────────────
    async function loadTrades() {
      const trades = await fetch('/api/trades?limit=15').then(r => r.json());
      const tbody = document.getElementById('trades');
      if (!trades.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No trades recorded</td></tr>';
        return;
      }
      const isMainnet = activeNetwork?.includes('mainnet');
      const scanBase = isMainnet ? 'https://basescan.org' : 'https://sepolia.basescan.org';
      tbody.innerHTML = trades.map(t => `
        <tr>
          <td style="white-space:nowrap;color:var(--text-2)">${new Date(t.timestamp).toLocaleString()}</td>
          <td class="${t.action}">${t.action.toUpperCase()}${t.dry_run ? ' <span style="opacity:.4;font-weight:400;font-size:0.7rem;font-family:inherit">[dry]</span>' : ''}</td>
          <td>${parseFloat(t.amount_eth).toFixed(6)} ETH</td>
          <td>$${parseFloat(t.price_usd).toFixed(2)}</td>
          <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-2);font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;letter-spacing:0.03em">${t.reason ?? ''}</td>
          <td style="font-size:0.65rem;opacity:.5">${t.tx_hash ? `<a href="${scanBase}/tx/${t.tx_hash}" target="_blank" style="color:var(--accent);text-decoration:none">${t.tx_hash.slice(0,10)}\u2026</a>` : '—'}</td>
        </tr>
      `).join('');
    }

    // ── Wallet ────────────────────────────────────────────────────────────────
    let fullWalletAddress = '';
    let walletExpanded = false;

    async function loadWallet() {
      try {
        const w = await fetch('/api/wallet').then(r => r.json());
        if (w.address) {
          fullWalletAddress = w.address;
          renderWalletAddress();
          document.getElementById('walletNetwork').textContent = w.network ?? '';
        }
      } catch (_) {}
    }

    function renderWalletAddress() {
      const el = document.getElementById('walletAddress');
      el.textContent = walletExpanded
        ? fullWalletAddress
        : fullWalletAddress.slice(0, 6) + '…' + fullWalletAddress.slice(-4);
    }

    function toggleWalletAddress() {
      if (!fullWalletAddress) return;
      walletExpanded = !walletExpanded;
      document.getElementById('walletWrap').classList.toggle('expanded', walletExpanded);
      renderWalletAddress();
      copyWalletAddress();
    }

    function copyWalletAddress() {
      if (!fullWalletAddress) return;
      navigator.clipboard.writeText(fullWalletAddress).then(() => {
        const copyEl = document.getElementById('walletCopy');
        copyEl.textContent = '✓';
        copyEl.classList.add('copied');
        setTimeout(() => {
          copyEl.textContent = '⎘';
          copyEl.classList.remove('copied');
        }, 2000);
      });
    }

    // ── Controls ──────────────────────────────────────────────────────────────
    async function control(action) {
      await fetch('/api/control/' + action, { method: 'POST' });
      await loadStatus();
    }

    async function manualTrade(action) {
      if (!confirm(`Execute manual ${action.toUpperCase()}?`)) return;
      await fetch('/api/control/' + action, { method: 'POST' });
    }

    async function requestFaucet() {
      const btn = document.getElementById('faucetBtn');
      btn.disabled = true;
      btn.textContent = 'Requesting…';
      try {
        const r = await fetch('/api/faucet', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        const data = await r.json();
        if (data.ok) {
          btn.textContent = 'Sent!';
          setTimeout(() => { btn.textContent = 'Faucet'; btn.disabled = false; }, 5000);
        } else {
          alert('Faucet error: ' + (data.error ?? 'unknown'));
          btn.textContent = 'Faucet';
          btn.disabled = false;
        }
      } catch (e) {
        alert('Faucet request failed');
        btn.textContent = 'Faucet';
        btn.disabled = false;
      }
    }

    // ── Refresh ───────────────────────────────────────────────────────────────
    async function refresh() {
      await Promise.all([loadStatus(), loadCharts(), loadTrades(), loadWallet()]);
      // Show faucet button only on testnet
      document.getElementById('faucetBtn').style.display =
        activeNetwork?.includes('mainnet') ? 'none' : 'inline-block';
    }

    refresh();
    setInterval(refresh, 10000);
  </script>
</body>
</html>
